{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1">{{ form_title }}</h1>
            <p class="text-muted mb-0">Enter the course details and a valid capacity before saving.</p>
        </div>
        <a class="btn btn-outline-secondary" href="{{ url_for('courses') }}">Back to Courses</a>
    </div>

    <form method="post">
        <div class="mb-3">
            <label class="form-label" for="course_name">Course Name</label>
            <input
                class="form-control"
                id="course_name"
                name="course_name"
                type="text"
                value="{{ form_data.get('course_name', '') }}"
                required
            >
        </div>
        <div class="mb-3">
            <label class="form-label" for="instructor">Instructor</label>
            <input
                class="form-control"
                id="instructor"
                name="instructor"
                type="text"
                value="{{ form_data.get('instructor', '') }}"
                required
            >
        </div>
        <div class="mb-4">
            <label class="form-label" for="max_capacity">Maximum Capacity</label>
            <input
                class="form-control"
                id="max_capacity"
                name="max_capacity"
                type="number"
                min="1"
                value="{{ form_data.get('max_capacity', '') }}"
                required
            >
        </div>
        <button class="btn btn-primary" type="submit">{{ submit_label }}</button>
    </form>
</div>
{% endblock %}
